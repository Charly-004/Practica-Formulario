<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Goose Bistro | Pizza-on-Demand</title>
</head>

<body>
    <h1>Black Goose Bistro | Pizza-on-Demand</h1>
    <p>Our 12" wood-fired pizzas are available for delivery. Build your custom pizza and we'll deliver it within an
        hour.</p>

    <form action="http://blackgoosebistro.com/pizza.php" method="POST">

        <fieldset>
            <legend>Your Information</legend>


            <p><label for="customername">Name:</label>
                <input type="text" id="customername" name="customername">
            </p>

            <p> <label for="address">Address:</label>
                <input type="text" id="address" name="address">
            </p>

            <p>

                <label for="telephone">Telephone Number:</label>
                <input type="tel" id="telephone" name="telephone">

            </p>

            <p>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">

            </p>

            <p>
                <label for="instructions">Delivery instructions:</label><br>
                <textarea id="instructions" name="instructions" maxlength="400"
                    placeholder="No more than 400 characters long."></textarea>

            </p>
            
        </fieldset>

        <fieldset>
            <legend>Design Your Dream Pizza:</legend>
            <p>Pizza specs</p>

            <p>Crust (Choose one):<br>
                <label><input type="radio" name="crust" value="white"> Classic white</label><br>
                <label><input type="radio" name="crust" value="multigrain"> Multigrain</label><br>
                <label><input type="radio" name="crust" value="cheese-stuffed"> Cheese-stuffed crust</label><br>
                <label><input type="radio" name="crust" value="gluten-free"> Gluten-free</label>
            </p>

            <p>Toppings (Choose as many as you want):<br>
                <label><input type="checkbox" name="toppings[]" value="red-sauce" checked> Red sauce</label><br>
                <label><input type="checkbox" name="toppings[]" value="white-sauce"> White sauce</label><br>
                <label><input type="checkbox" name="toppings[]" value="mozzarella"> Mozzarella cheese</label><br>
                <label><input type="checkbox" name="toppings[]" value="pepperoni"> Pepperoni</label><br>
                <label><input type="checkbox" name="toppings[]" value="mushrooms"> Mushrooms</label><br>
                <label><input type="checkbox" name="toppings[]" value="peppers"> Peppers</label><br>
                <label><input type="checkbox" name="toppings[]" value="anchovies"> Anchovies</label>
            </p>
        </fieldset>

        <fieldset>
            <p>
            <label for="pizzas">How many pizzas:</label>
            <select id="pizzas" name="pizzas">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
            </select>
        </p>
        <p>
            <button type="submit">Bring me a pizza!</button>
        </p>
        </fieldset>

    </form>
</body>

</html>
